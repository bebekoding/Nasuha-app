<!DOCTYPE html>
<html lang="id">
<head>
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Nasuha — Muslim personal growth companion. Muhasabah harian, Al-Quran, Dzikir, Sedekah, dan analitik ibadah.">
  <meta name="theme-color" content="#8A5A3A">

  <!-- iOS / mobile web meta -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Nasuha">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon & manifest -->
  <link rel="icon" type="image/png" href="favicon.png"/>
  <link rel="manifest" href="manifest.json">

  <title>Nasuha — Level up your soul · Level up your amal</title>

  <style>
    html, body { margin: 0; padding: 0; background: #F4ECDD; }
    /* Splash sederhana selama Flutter bootstrap */
    #loading {
      position: fixed; inset: 0;
      display: flex; align-items: center; justify-content: center;
      background: #F4ECDD; color: #3B2E22;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }
    #loading .dot {
      width: 12px; height: 12px; border-radius: 50%;
      background: #8A5A3A; margin: 0 4px; opacity: 0.3;
      animation: pulse 1.2s ease-in-out infinite;
    }
    #loading .dot:nth-child(2) { animation-delay: 0.2s; }
    #loading .dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes pulse { 0%,100% { opacity: 0.3; } 50% { opacity: 1; } }
  </style>
</head>
<body>
  <div id="loading">
    <div class="dot"></div>
    <div class="dot"></div>
    <div class="dot"></div>
  </div>
  <script>
    // Hilangkan splash HTML begitu Flutter selesai mount UI-nya.
    window.addEventListener('flutter-first-frame', function () {
      var el = document.getElementById('loading');
      if (el) el.remove();
    });

    // Helper untuk Dart js_interop — Notification constructor tidak bisa
    // dipanggil langsung via `@JS()` external function.
    window.nasuhaShowNotification = function (title, body, tag, icon) {
      if (typeof Notification === 'undefined') return;
      if (Notification.permission !== 'granted') return;
      try {
        new Notification(title, {
          body: body,
          tag: tag || 'nasuha',
          icon: icon || '/icons/Icon-192.png',
          badge: '/icons/Icon-192.png',
        });
      } catch (e) {
        console.warn('[Nasuha] notif failed:', e);
      }
    };
  </script>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
