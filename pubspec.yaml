name: muhasabah
description: "A privacy-first Muslim personal growth companion."
publish_to: 'none'
version: 1.2.4+6

environment:
  sdk: ^3.12.1

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Routing
  go_router: ^14.6.2

  # Local storage helpers (DB via Drift, lihat di bawah)
  path_provider: ^2.1.5

  # HTTP client — untuk POST subscribe FCM ke backend push server.
  http: ^1.2.2

  # Cloud backup (Google Drive App Folder — user owns their data)
  google_sign_in: ^6.2.2
  # Explicit web plugin — dibutuhkan supaya build web pakai Google Identity
  # Services (GIS). Client_id di web/index.html meta tag.
  google_sign_in_web: ^0.12.4+4
  googleapis: ^13.2.0
  googleapis_auth: ^1.6.0
  extension_google_sign_in_as_googleapis_auth: ^2.0.12

  # Encryption (AES-GCM + PBKDF2)
  cryptography: ^2.7.0

  # Notifications
  flutter_local_notifications: ^18.0.1
  timezone: ^0.10.0

  # Location & sensors
  geolocator: ^13.0.2
  geocoding: ^3.0.0
  flutter_compass: ^0.8.1

  # Prayer time calculation
  adhan: ^2.0.0+1

  # Charts
  fl_chart: ^0.69.2

  # Storage / preferences
  shared_preferences: ^2.3.3

  # Security
  local_auth: ^2.3.0

  # Utils
  intl: ^0.20.2
  collection: ^1.18.0
  uuid: ^4.5.1
  share_plus: ^10.0.0
  file_picker: ^8.0.0
  package_info_plus: ^8.0.0

  # DB baru (target v1.2.1) — migrasi bertahap dari Isar. Jalan di
  # mobile (sqlite native) + web (sqlite-wasm).
  drift: ^2.25.0
  drift_flutter: ^0.2.7
  sqlite3_flutter_libs: ^0.5.24
  path: ^1.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

  build_runner: ^2.4.13
  # isar_generator dihapus (bentrok analyzer dgn drift_dev). Generated
  # .g.dart Isar tetap committed & valid; kalau perlu regen model Isar
  # selama transisi, tambahkan sementara.
  drift_dev: ^2.25.0
  flutter_launcher_icons: ^0.14.1

flutter:
  uses-material-design: true
  assets:
    - assets/data/
    - assets/icon/

  # Bundled offline (variable fonts → fontWeight maps to the wght axis).
  # Space Grotesk = display/numbers, Plus Jakarta Sans = body/UI.
  fonts:
    - family: Space Grotesk
      fonts:
        - asset: assets/fonts/SpaceGrotesk.ttf
    - family: Plus Jakarta Sans
      fonts:
        - asset: assets/fonts/PlusJakartaSans.ttf
    # Naskh Arab untuk teks Al-Quran. Mencakup tanda mushaf Kemenag spt
    # U+08D6 "small high ain" yang tak ada di font sistem (dulu tampil kotak ▯).
    - family: Scheherazade New
      fonts:
        - asset: assets/fonts/ScheherazadeNew-Regular.ttf
        - asset: assets/fonts/ScheherazadeNew-Bold.ttf
          weight: 700

flutter_launcher_icons:
  android: true
  ios: true
  remove_alpha_ios: true
  image_path: "assets/icon/nasuha_icon.png"
  adaptive_icon_background: "#F8F5E4"
  adaptive_icon_foreground: "assets/icon/nasuha_icon_fg.png"
  min_sdk_android: 21
