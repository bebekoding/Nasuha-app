<!DOCTYPE html>
<html lang="id">
<head>
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Nasuha — Muslim personal growth companion. Muhasabah harian, Al-Quran, Dzikir, Sedekah, dan analitik ibadah.">
  <meta name="theme-color" content="#8A5A3A">

  <!-- iOS / mobile web meta -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Nasuha">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon & manifest -->
  <link rel="icon" type="image/png" href="favicon.png"/>
  <link rel="manifest" href="manifest.json">

  <!-- Google Sign-In Web (untuk backup Drive di PWA).
       Ganti PLACEHOLDER dengan Web OAuth Client ID dari Google Cloud Console.
       Lihat: docs/SETUP-Google-Web-OAuth.md -->
  <meta name="google-signin-client_id"
        content="PLACEHOLDER_WEB_CLIENT_ID.apps.googleusercontent.com">

  <title>Nasuha — Level up your soul · Level up your amal</title>

  <style>
    html, body { margin: 0; padding: 0; background: #F4ECDD; }
    /* Splash sederhana selama Flutter bootstrap */
    #loading {
      position: fixed; inset: 0;
      display: flex; align-items: center; justify-content: center;
      background: #F4ECDD; color: #3B2E22;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }
    #loading .dot {
      width: 12px; height: 12px; border-radius: 50%;
      background: #8A5A3A; margin: 0 4px; opacity: 0.3;
      animation: pulse 1.2s ease-in-out infinite;
    }
    #loading .dot:nth-child(2) { animation-delay: 0.2s; }
    #loading .dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes pulse { 0%,100% { opacity: 0.3; } 50% { opacity: 1; } }
  </style>
</head>
<body>
  <div id="loading">
    <div class="dot"></div>
    <div class="dot"></div>
    <div class="dot"></div>
  </div>
  <script>
    // Hilangkan splash HTML begitu Flutter selesai mount UI-nya.
    window.addEventListener('flutter-first-frame', function () {
      var el = document.getElementById('loading');
      if (el) el.remove();
    });

    // Helper untuk Dart js_interop — Notification constructor tidak bisa
    // dipanggil langsung via `@JS()` external function.
    window.nasuhaShowNotification = function (title, body, tag, icon) {
      if (typeof Notification === 'undefined') return;
      if (Notification.permission !== 'granted') return;
      try {
        new Notification(title, {
          body: body,
          tag: tag || 'nasuha',
          icon: icon || '/icons/Icon-192.png',
          badge: '/icons/Icon-192.png',
        });
      } catch (e) {
        console.warn('[Nasuha] notif failed:', e);
      }
    };
  </script>

  <!-- Firebase Cloud Messaging (FCM Web Push) — untuk notif adzan yang tetap
       muncul saat tab Nasuha tertutup. Config di bawah harus MATCH dengan
       yang di web/firebase-messaging-sw.js. Lihat docs/SETUP-FCM-Push.md
       untuk cara isi placeholder. -->
  <script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-messaging-compat.js"></script>
  <script>
    var NASUHA_FIREBASE_CONFIG = {
      apiKey: 'PLACEHOLDER_FIREBASE_API_KEY',
      authDomain: 'nasuha-500606.firebaseapp.com',
      projectId: 'nasuha-500606',
      storageBucket: 'nasuha-500606.appspot.com',
      messagingSenderId: 'PLACEHOLDER_SENDER_ID',
      appId: 'PLACEHOLDER_APP_ID',
    };
    // VAPID key — Web Push certificates dari Firebase Console → Cloud
    // Messaging → Web Push certificates → Generate key pair.
    var NASUHA_VAPID_PUBLIC_KEY = 'PLACEHOLDER_VAPID_PUBLIC_KEY';

    var _nasuhaFcmMessaging = null;
    try {
      if (NASUHA_FIREBASE_CONFIG.apiKey.indexOf('PLACEHOLDER') !== 0) {
        firebase.initializeApp(NASUHA_FIREBASE_CONFIG);
        _nasuhaFcmMessaging = firebase.messaging();

        // Handle notif saat tab Nasuha AKTIF (foreground). Kalau tab
        // background, SW yang handle via onBackgroundMessage.
        _nasuhaFcmMessaging.onMessage(function (payload) {
          if (typeof Notification === 'undefined') return;
          if (Notification.permission !== 'granted') return;
          var n = payload.notification || {};
          var d = payload.data || {};
          try {
            new Notification(n.title || 'Nasuha', {
              body: n.body || '',
              tag: d.tag || 'nasuha-adhan',
              icon: '/icons/Icon-192.png',
              badge: '/icons/Icon-192.png',
              renotify: true,
            });
          } catch (e) {
            console.warn('[Nasuha FCM] foreground show failed:', e);
          }
        });
      } else {
        console.warn(
          '[Nasuha] Firebase config masih PLACEHOLDER. Push notif belum aktif — lihat docs/SETUP-FCM-Push.md.'
        );
      }
    } catch (e) {
      console.error('[Nasuha] Firebase init failed:', e);
    }

    // Helper Dart js_interop: subscribe FCM + return token yang dikirim
    // ke backend. Return null bila gagal (SDK belum init / permission
    // ditolak / VAPID salah).
    window.nasuhaSubscribeToFcm = async function () {
      if (!_nasuhaFcmMessaging) return null;
      if (typeof Notification === 'undefined') return null;
      if (Notification.permission !== 'granted') return null;
      try {
        var reg = await navigator.serviceWorker.register(
          '/firebase-messaging-sw.js',
          { scope: '/firebase-cloud-messaging-push-scope' }
        );
        var token = await _nasuhaFcmMessaging.getToken({
          vapidKey: NASUHA_VAPID_PUBLIC_KEY,
          serviceWorkerRegistration: reg,
        });
        return token || null;
      } catch (e) {
        console.warn('[Nasuha FCM] subscribe failed:', e);
        return null;
      }
    };

    // Unsubscribe: hapus token FCM saat user matikan notif.
    window.nasuhaUnsubscribeFromFcm = async function () {
      if (!_nasuhaFcmMessaging) return false;
      try {
        return await _nasuhaFcmMessaging.deleteToken();
      } catch (e) {
        console.warn('[Nasuha FCM] delete token failed:', e);
        return false;
      }
    };
  </script>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
