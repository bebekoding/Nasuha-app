name: Build & Deploy PWA

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Show Flutter version
        run: flutter --version

      - name: Install dependencies
        run: flutter pub get

      - name: Download Drift web runtime (sqlite3.wasm + drift_worker.js)
        run: |
          curl -sL -o web/sqlite3.wasm \
            "https://github.com/simolus3/sqlite3.dart/releases/latest/download/sqlite3.wasm"
          curl -sL -o web/drift_worker.js \
            "https://github.com/simolus3/drift/releases/latest/download/drift_worker.js"
          ls -lh web/sqlite3.wasm web/drift_worker.js

      - name: Analyze
        run: flutter analyze --no-fatal-infos

      - name: Run tests
        run: flutter test

      - name: Build web (release, CanvasKit)
        run: flutter build web --release --no-tree-shake-icons

      - name: Copy vercel.json to build output
        run: cp vercel.json build/web/vercel.json

      - name: Deploy to Vercel
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          vercel-args: '--prod'
          working-directory: build/web
